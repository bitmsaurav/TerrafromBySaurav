name: Terraform Validate & Format Check

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '**.tf'
      - '.github/workflows/terraform-validate.yml'

env:
  TF_VERSION: 1.3.0

jobs:
  terraform-validate:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init (for validation)
        id: init
        run: |
          terraform init -backend=false
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate
        continue-on-error: true

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fmt = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '❌';
            const init = '${{ steps.init.outcome }}' === 'success' ? '✅' : '❌';
            const validate = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';

            const comment = `## Terraform Validation Results

            | Check | Result |
            |-------|--------|
            | Format Check | ${fmt} |
            | Init | ${init} |
            | Validate | ${validate} |
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if validation failed
        if: |
          steps.fmt.outcome == 'failure' ||
          steps.init.outcome == 'failure' ||
          steps.validate.outcome == 'failure'
        run: exit 1
