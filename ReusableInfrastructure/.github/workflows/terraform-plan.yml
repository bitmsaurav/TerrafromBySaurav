name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '**.tf'
      - '.github/workflows/terraform-plan.yml'

env:
  TF_VERSION: 1.3.0
  ENVIRONMENT: dev

jobs:
  terraform-plan:
    name: Terraform Plan - Development
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="environments/${ENVIRONMENT}/backend.tfbackend" \
            -upgrade
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${ENVIRONMENT}/${ENVIRONMENT}.tfvars" \
            -out=tfplan
        continue-on-error: true

      - name: Format Plan Output
        id: fmt-plan
        if: always()
        run: |
          terraform show -no-color tfplan > plan.txt
          echo "PLAN_OUTPUT<<EOF" >> $GITHUB_ENV
          cat plan.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const maxChars = 30000;
            const truncated = plan.length > maxChars ? plan.substring(0, maxChars) + '\n... (truncated)' : plan;

            const comment = `## Terraform Plan Results (${process.env.ENVIRONMENT})

            \`\`\`terraform
            ${truncated}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
