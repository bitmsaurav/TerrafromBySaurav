name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '**.tf'

env:
  TF_VERSION: 1.3.0

jobs:
  deploy-dev:
    name: Deploy - Development
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="environments/dev/backend.tfbackend" \
            -upgrade

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file="environments/dev/dev.tfvars" \
            -auto-approve

      - name: Capture Outputs
        run: |
          terraform output -json > outputs.json
          echo "Deployment completed successfully"

  deploy-staging:
    name: Deploy - Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="environments/staging/backend.tfbackend" \
            -upgrade

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file="environments/staging/staging.tfvars" \
            -auto-approve

  deploy-prod:
    name: Deploy - Production
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="environments/prod/backend.tfbackend" \
            -upgrade

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file="environments/prod/prod.tfvars" \
            -auto-approve
